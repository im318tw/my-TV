<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雲端電視 - GitHub Pages 專用版</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        :root {
            --bg-color: #0b0f19; --panel-bg: #1e293b; --text-color: #f8fafc;
            --focus-color: #fbbf24; --active-color: #ef4444; --success: #10b981;
        }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); font-family: -apple-system, sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .player-container { width: 100%; height: 50vh; background-color: #000; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        video { width: 100%; height: 100%; background: #000; outline: none; }
        .playing-info { position: absolute; bottom: 20px; left: 20px; background: rgba(0, 0, 0, 0.7); padding: 8px 15px; border-radius: 5px; font-weight: bold; border-left: 4px solid var(--active-color); z-index: 10; }
        
        .controls { padding: 15px; background: #111827; }
        .filter-group { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filter-group::-webkit-scrollbar { display: none; }
        
        button { background: var(--panel-bg); color: #fff; border: 2px solid transparent; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        button:focus, button.active { border-color: var(--focus-color); background: #334155; transform: scale(1.05); outline: none; }
        button.tool-btn { background: var(--success); }

        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 15px; }
        .channel-btn { display: flex; flex-direction: column; height: 70px; justify-content: center; align-items: center; background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 10px; font-size: 0.95rem; }
        .tag { font-size: 0.7rem; color: #94a3b8; margin-top: 4px; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 3px; }
        
        @media (max-width: 768px) { .player-container { height: 35vh; } .channel-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

<div class="player-container">
    <video id="tv-video" controls autoplay playsinline></video>
    <div class="playing-info" id="status-text">📺 請選擇頻道</div>
</div>

<div class="controls">
    <div class="filter-group">
        <button class="tool-btn" onclick="downloadList()">📥 下載 M3U (電腦推薦)</button>
        <button onclick="alert('提示：\n1. RTMP 協議瀏覽器不支持，請用電腦版觀看。\n2. 若播放失敗請點擊下載 M3U 用 PotPlayer 開啟。')">❓ 播放說明</button>
    </div>
    <div class="filter-group" id="region-bar">
        <button class="region-btn active" data-region="all">全部</button>
        <button class="region-btn" data-region="tw">🇹🇼 台灣/衛視</button>
        <button class="region-btn" data-region="hkmo">🇭🇰🇲🇴 港澳台</button>
        <button class="region-btn" data-region="cctv">🇨🇳 央視/4K</button>
    </div>
</div>

<div class="channel-grid" id="list-container"></div>

<script>
    const channels = [
        // --- 央視 & 4K ---
        { name: "CCTV-1 綜合", url: "http://124.90.44.40:6060/010/2/00000001000000060000000000000469?virtualDomain=010.live_hls.zte.com", region: "cctv" },
        { name: "CCTV-3 綜藝", url: "http://124.90.44.40:6060/010/2/00000001000000060000000000000642?virtualDomain=010.live_hls.zte.com", region: "cctv" },
        { name: "CCTV-4 中文", url: "http://124.90.44.40:6060/010/2/00000009000000060000000000002077?virtualDomain=010.live_hls.zte.com", region: "cctv" },
        { name: "CCTV-5+ 體育", url: "http://124.90.44.40:6060/010/2/00000001000000060000000000000788?virtualDomain=010.live_hls.zte.com", region: "cctv" },
        { name: "CCTV-4K 超清", url: "http://www.520345.xyz:8188/rtp/239.69.1.111:10304?", region: "cctv" },
        
        // --- 港澳台系列 (測速可用) ---
        { name: "翡翠台 (4K)", url: "https://o11.163189.xyz/stream/tvb/fct4k/", region: "hkmo" },
        { name: "翡翠台 (備用)", url: "https://mytv.cdn.loc.cc/o12.php?id=fct", region: "hkmo" },
        { name: "TVB Plus", url: "https://o11.163189.xyz/stream/tvb/tvbp/", region: "hkmo" },
        { name: "無線新聞 (iNews)", url: "http://74.91.26.218:82/live/inews.m3u8", region: "hkmo" },
        { name: "鳳凰中文 (高清)", url: "http://61.184.46.85:85/tsfile/live/1029_1.m3u8?key=txiptv&playlive=1&authid=0", region: "hkmo" },
        { name: "鳳凰中文 (備用)", url: "http://r.jdshipin.com/cCCzW", region: "hkmo" },
        { name: "鳳凰資訊", url: "https://cdn9.163189.xyz/smt3.1.1.php?id=phoenixinfo_hd", region: "hkmo" },
        { name: "NOW新聞台", url: "http://cdn.163189.xyz/163189/now", region: "hkmo" },
        { name: "NOW體育台", url: "http://rihou.cc:555/tv/[Mt]Now体育", region: "hkmo" },
        { name: "ViuTV", url: "https://cdn.163189.xyz/163189/viu", region: "hkmo" },
        
        // --- 台灣與衛視 ---
        { name: "TVBS", url: "http://38.64.72.148:80/hls/modn/list/4005/chunklist1.m3u8", region: "tw" },
        { name: "TVBS新聞台", url: "http://rihou.cc:555/tv/[FY]tvbS新聞", region: "tw" },
        { name: "台視新聞", url: "http://38.64.72.148:80/hls/modn/list/4013/chunklist1.m3u8", region: "tw" },
        { name: "民視新聞", url: "http://38.64.72.148:80/hls/modn/list/4012/chunklist1.m3u8", region: "tw" },
        { name: "中視", url: "rtmp://f13h.mine.nu/sat/tv091", region: "tw" },
        { name: "華視", url: "rtmp://f13h.mine.nu/sat/tv111", region: "tw" },
        { name: "浙江衛視 (4K)", url: "http://124.90.44.40:6060/010/2/00000009000000060000000000002065?virtualDomain=010.live_hls.zte.com", region: "tw" },
        { name: "湖南衛視 (4K)", url: "http://124.90.44.40:6060/010/2/00000009000000060000000000002069?virtualDomain=010.live_hls.zte.com", region: "tw" }
    ];

    let currentRegion = 'all';
    const video = document.getElementById('tv-video');
    const statusText = document.getElementById('status-text');
    let hls = null;

    function render() {
        const container = document.getElementById('list-container');
        container.innerHTML = '';
        const filtered = channels.filter(c => currentRegion === 'all' || c.region === currentRegion);
        
        filtered.forEach(ch => {
            const btn = document.createElement('button');
            btn.className = 'channel-btn';
            const isRTMP = ch.url.startsWith('rtmp');
            btn.innerHTML = `<span>${ch.name}</span><span class="tag">${isRTMP ? 'RTMP(限電腦)' : 'HLS'}</span>`;
            btn.onclick = () => play(ch);
            container.appendChild(btn);
        });
    }

    function play(ch) {
        if (ch.url.startsWith('rtmp')) {
            statusText.innerText = "❌ 瀏覽器不支持 RTMP，請下載 M3U 用 PotPlayer 觀看";
            return;
        }

        statusText.innerText = "⏳ 正在加載: " + ch.name;
        if (Hls.isSupported()) {
            if (hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(ch.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
                statusText.innerText = "▶️ 正在播放: " + ch.name;
            });
            hls.on(Hls.Events.ERROR, (e, data) => {
                if (data.fatal) statusText.innerText = "⚠️ 播放失敗，請檢查線路或使用電腦版";
            });
        } else {
            video.src = ch.url;
            statusText.innerText = "▶️ 正在播放: " + ch.name;
        }
    }

    function downloadList() {
        let m3u = "#EXTM3U\n";
        channels.forEach(ch => m3u += `#EXTINF:-1,${ch.name}\n${ch.url}\n`);
        const blob = new Blob([m3u], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'TV_Collection.m3u';
        a.click();
    }

    document.querySelectorAll('.region-btn').forEach(btn => {
        btn.onclick = (e) => {
            document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentRegion = e.target.dataset.region;
            render();
        };
    });

    window.onload = render;
</script>

</body>
</html>
