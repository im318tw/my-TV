        let currentRegion = 'all', currentGenre = 'all', hls = null;
        const video = document.getElementById('tv-video'), infoText = document.getElementById('play-text'), historyBanner = document.getElementById('history-banner');
        
        function renderChannels() {
            const list = document.getElementById('channel-list');
            list.innerHTML = ''; 
            const filtered = channels.filter(ch => (currentRegion === 'all' || ch.region === currentRegion) && (currentGenre === 'all' || ch.genre === currentGenre));

            filtered.forEach(ch => {
                const btn = document.createElement('button');
                btn.className = 'channel-btn'; btn.tabIndex = 0;
                const genreMap = { 'news': '新聞', 'movies': '影劇', 'sports': '體育', 'variety': '綜合', 'discovery': '探索', 'kids': '兒童', 'travel': '旅遊', 'music': '音樂', 'religion': '宗教' };
                btn.innerHTML = `<span>${ch.name}</span><span class="genre-tag">${genreMap[ch.genre] || ''}</span>`;
                btn.onclick = () => playStream(ch);
                list.appendChild(btn);
            });
            if(filtered.length === 0) list.innerHTML = '<div style="font-size: 1.5rem; text-align:center; grid-column: 1/-1; padding: 40px;">此分類無頻道</div>';
        }

        function playStream(channelObj, autoScroll = true) {
            infoText.innerText = "⏳ 載入中: " + channelObj.name + "...";
            localStorage.setItem('tv_last_watched', JSON.stringify(channelObj));
            if (autoScroll) { window.scrollTo({ top: 0, behavior: 'smooth' }); video.focus(); }

            if (Hls.isSupported()) {
                if (hls) hls.destroy(); 
                hls = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 600 });
                hls.loadSource(channelObj.url); hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => { infoText.innerText = "▶️ 正在播放: " + channelObj.name; video.play().catch(e => console.log("等待點擊")); });
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) { infoText.innerText = "❌ 網路限制(CORS)或失效: " + channelObj.name; hls.destroy(); }
                        else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) { infoText.innerText = "⚠️ 嘗試修復畫片..."; hls.recoverMediaError(); }
                        else { infoText.innerText = "❌ 無法播放: " + channelObj.name; hls.destroy(); }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channelObj.url;
                video.addEventListener('loadedmetadata', () => { infoText.innerText = "▶️ 正在播放: " + channelObj.name; video.play(); });
                video.addEventListener('error', () => { infoText.innerText = "❌ 影片載入失敗: " + channelObj.name; });
            }
        }

        function loadHistory() {
            const saved = localStorage.getItem('tv_last_watched');
            if (saved) {
                try {
                    const ch = JSON.parse(saved); document.getElementById('history-name').innerText = ch.name; historyBanner.style.display = 'block';
                    playStream(ch, false); setTimeout(() => { historyBanner.style.display = 'none'; }, 4000);
                } catch(e) {}
            }
        }

        // 遙控器與過濾邏輯
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const isRegion = e.target.classList.contains('region-btn');
                document.querySelectorAll(isRegion ? '.region-btn' : '.genre-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                if (isRegion) currentRegion = e.target.getAttribute('data-region');
                else currentGenre = e.target.getAttribute('data-genre');
                renderChannels();
            });
        });

        document.addEventListener('keydown', (e) => {
            const focusable = Array.from(document.querySelectorAll('button, video'));
            const currentIndex = focusable.indexOf(document.activeElement);
            const scrollToFocus = (element) => { element.focus(); element.scrollIntoView({ behavior: 'smooth', block: 'center' }); };

            switch(e.key) {
                case 'ArrowRight': e.preventDefault(); if (currentIndex >= 0 && currentIndex < focusable.length - 1) scrollToFocus(focusable[currentIndex + 1]); break;
                case 'ArrowLeft': e.preventDefault(); if (currentIndex > 0) scrollToFocus(focusable[currentIndex - 1]); break;
                case 'ArrowDown':
                    e.preventDefault();
                    if (document.activeElement.classList.contains('filter-btn')) { const firstChannel = document.querySelector('.channel-btn'); if (firstChannel) scrollToFocus(firstChannel); } 
                    else if (currentIndex >= 0) scrollToFocus(focusable[Math.min(currentIndex + 4, focusable.length - 1)]);
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    if (currentIndex > 0) {
                        if (document.activeElement.classList.contains('channel-btn') && currentIndex <= 16) scrollToFocus(document.querySelector('.genre-btn.active'));
                        else scrollToFocus(focusable[Math.max(currentIndex - 4, 0)]);
                    }
                    break;
                case 'Enter': if (document.activeElement === video) { if (video.paused) video.play(); else video.pause(); } break;
                case 'Escape': case 'Backspace': if (document.fullscreenElement) document.exitFullscreen(); break;
            }
        });

        window.onload = () => { renderChannels(); loadHistory(); document.querySelector('.region-btn.active').focus(); };
    </script>
